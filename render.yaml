databases:
  - name: ai-broker-db
    databaseName: broker_db
    user: broker
    plan: free

services:
  # --- Backend API ---
  - type: web
    name: ai-broker-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/portfolio/portfolios/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-broker-db
          property: connectionString
      - key: REDIS_URL
        sync: false   # set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false   # set to your .onrender.com domain after first deploy
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # set to your frontend .onrender.com URL after first deploy
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: BROKER_BACKEND
        value: paper

  # --- Celery Worker + Beat (combined to fit free tier) ---
  - type: worker
    name: ai-broker-celery
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    startCommand: celery -A config.celery worker --beat --loglevel=info --concurrency=2 --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-broker-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false   # share same value as backend — set manually
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: BROKER_BACKEND
        value: paper

  # --- Telegram Bot ---
  - type: worker
    name: ai-broker-telegram
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    startCommand: python manage.py run_telegram_bot
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-broker-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

  # --- Frontend Static Site ---
  - type: web
    name: ai-broker-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # set to https://ai-broker-backend.onrender.com/api
